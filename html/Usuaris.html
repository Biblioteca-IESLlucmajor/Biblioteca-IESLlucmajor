        (function() {
            // Inicialitzar EmailJS si la configuració existeix i no són els valors per defecte
            if (typeof emailjs !== 'undefined' && window.EMAILJS_CONFIG) {
                if (window.EMAILJS_CONFIG.PUBLIC_KEY && !window.EMAILJS_CONFIG.PUBLIC_KEY.includes('PON_AQUI')) {
                    emailjs.init({ publicKey: window.EMAILJS_CONFIG.PUBLIC_KEY });
                    console.log("EmailJS inicialitzat.");
                } else {
                    console.warn("EmailJS no configurat. Revisa js/email-config.js");
                }
            }
        })();
